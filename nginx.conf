# Bloque de eventos: define la cantidad de conexiones simultáneas
events {
    worker_connections 1024;  # Valor por defecto
}

http {
    # Oculta la versión del servidor en la cabecera 'Server'
    server_tokens off;

    # Carga los tipos MIME estándar
    include /etc/nginx/mime.types;

    # Habilita compresión gzip para mejorar rendimiento
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/json
        application/ld+json;

    server {
        listen 8080;

        # Encabezados de seguridad recomendados
        add_header X-XSS-Protection "1; mode=block" always;  # Protección contra XSS reflejado
        add_header X-Frame-Options "DENY" always;            # Previene clickjacking
        add_header X-Content-Type-Options "nosniff" always;  # Evita detección de tipo MIME
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # HSTS

        # Logs de acceso y errores
        error_log  /var/log/nginx/error.log;
        access_log /var/log/nginx/access.log;

        # Directorio raíz de la aplicación Angular
        root /opt/app-root/src;
        index index.html;

        # Ruta principal: permite carga de rutas internas en Angular
        location / {
            try_files $uri /index.html;
        }

        # Página de error 404 redirigida a Angular
        error_page 404 /index.html;

        # Archivos estáticos: cache por 6 meses y sin logging
        location ~* \.(?:css|js|map|ico|json|png|jpg|jpeg|gif|woff|woff2|ttf|otf|eot|svg)$ {
            expires 6M;
            access_log off;
        }
    }
}