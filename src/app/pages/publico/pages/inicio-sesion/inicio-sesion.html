<div class="grid grid-nogutter w-full flex-1">
  <div class="col-12 md:col-6 flex flex-column justify-content-center text-center">
    <span class="flex justify-content-center">
      <h1 class="text-3xl md:text-6xl font-bold">PLACA</h1>
    </span>
    <span class="flex justify-content-center">
      <p class="text-base md:text-2xl">Planeación y Control de Alimento</p>
    </span>
  </div>

  <div class="col-12 md:col-6 flex align-items-center justify-content-center px-4 md:px-2">
    <p-card>
      <form [formGroup]="loginForm">
        <div class="flex justify-content-center">
          <h2>Inicio de Sesión</h2>
        </div>
        <hr>
        <div class="field">
          <label for="matricula-login">Matrícula</label>
          <input id="matricula-login" type="text" pInputText formControlName="matricula" pSize="large"
                 placeholder="Ingresa Matrícula" class="w-full" />

        </div>
        <div class="field">
          <label for="pass-login">Constraseña</label>
          <input id="pass-login" type="password" pInputText formControlName="password" pSize="large"
                 placeholder="Ingresa contraseña" class="w-full" />

        </div>
      </form>
      <ng-template #footer>
        <section class="flex justify-content-end">
          <p-button type="submit" label="Ingresar" class="public-button" [styleClass]="'w-full'"
                    [disabled]="loginForm.invalid"></p-button>
        </section>
      </ng-template>
    </p-card>
  </div>
</div>
