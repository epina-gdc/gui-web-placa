<div class="grid grid-nogutter w-full flex-1 login-background">
  <div class="col-12 md:col-6 flex flex-column justify-content-center text-center pl-5">
    <span class="flex justify-content-center">
      <h1 class="titulo-inicio-sesion">PLACA</h1>
    </span>
    <span class="flex justify-content-center">
      <p class="titulo-inicio-sesion">Planeación y Control de Alimento</p>
    </span>
  </div>

  <div class="col-12 md:col-6 flex align-items-center justify-content-center px-4 md:px-2">
    <p-card class="inicio-sesion-form">
      <form [formGroup]="loginForm">
        <div class="inicio-sesion-form-body">
          <div class="flex justify-content-center inicio-sesion-form-header">
            <h2 class="inicio-sesion-form-titulo">Inicio de Sesión</h2>
          </div>
          <div class="field">
            <label for="matricula-login" class="label-input">Matrícula</label>
            <input id="matricula-login" type="text" pInputText formControlName="matricula" pSize="large"
                   placeholder="Ingresar matrícula" class="w-full" [maxlength]="10" />

          </div>
          <div class="field">
            <label for="pass-login" class="label-input">Constraseña</label>
            <input id="pass-login" type="password" pInputText formControlName="password" pSize="large"
                   placeholder="Ingresar contraseña" class="w-full" [maxlength]="15" />

          </div>
        </div>
      </form>
      <ng-template #footer>
        <section class="flex justify-content-end inicio-sesion-form-footer">
          <p-button type="submit" label="Ingresar" class="inicio-sesion-button" [styleClass]="'w-full'" (click)="iniciarSesion()"
                    [disabled]="loginForm.invalid || cargando()"></p-button>
        </section>
      </ng-template>
    </p-card>
  </div>
</div>
