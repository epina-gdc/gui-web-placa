<div class="flex justify-content-between align-items-center px-4 py-3 mb-2 lg:mb-0">

  <div class="flex align-items-center">
    <p-button variant="text" icon="pi pi-bars" />
    <img src="temporal/logo_imss2.png" alt="Logo IMSS" class="mr-3" />
    <div class="hr-vertical mx-0 me-3"></div>
    <span class="border-circle bg-green mr-2">PC</span>
    <span>Planeación y Control de Alimento</span>
  </div>

  <div class="flex align-items-center gap-3">
    <div class="text-center">
      <span class="text-overflow-ellipsis block font-medium">
        Adrian Reyes Torres
      </span>
      <span class="text-overflow-ellipsis text-sm text-600 block">
        HGZ 27
      </span>
    </div>
    <img [src]="'temporal/User_info.svg'" style="margin-top: 16px;"
         (click)="op.toggle($event)" />
    <p-popover #op styleClass="nav-popover">
      <div class="bg-menu-btn p-3 border-round-top">
        <div class="flex justify-content-between align-items-start">
          <div class="flex gap-2">
            <img  [src]="'temporal/User_info.svg'" />
            <div class="ml-1">
              <p class="font-bold text-lg mb-0">
                Mariana Abigail Leon Vargas
              </p>
              <p class="font-bold text-lg mb-0">
                Matrícula 3311002784
              </p>
              <p class="font-bold text-lg mb-0">
                Nutricionista
              </p>
            </div>
          </div>
          <i class="pi pi-times cursor-pointer" style="font-size: 1.2rem;"></i>
        </div>
      </div>
      <div style="min-width: 400px" class="p-3">
        <div class="flex flex-column gap-3">
          <div class="flex flex-column gap-1">
            <small>OOAD</small>
            <span>Prueba</span>
          </div>
          <div class="flex align-items-center gap-2">
            <div class="flex flex-column gap-1">
              <small>Unidad</small>
              <span>Prueba</span>
            </div>
          </div>
        </div>
      </div>
      <div
        class="flex justify-content-start align-items-center gap-2 border-round-bottom card py-3 px-2 flex-row cursor-pointer hover:surface-200"
        style="background-color: #FFFBFF;">
        <i class="pi pi-sign-out" style="font-size: 1.2rem;"></i>
        <span class="text-xl">Cerrar Sesión</span>
      </div>
    </p-popover>
  </div>
</div>
