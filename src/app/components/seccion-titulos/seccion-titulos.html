<div class="flex align-items-center gap-2 seccion-titulos">
  @if (retorno()) {
    <a class="bg-white border-circle justify-content-center align-items-center flex return" (click)="btnRegresar($event)">
      <img
        [src]="'temporal/flecha_atras.svg'"
        alt="Regresar"
        class="icon-regresar" />
    </a>
    <div class="hr-vertical"></div>
  }
  <h2 class="titulo-seccion m-0">{{ titulo() }}</h2>
</div>
