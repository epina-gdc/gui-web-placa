<div class="alert-fixed-container flex flex-column w-100 justify-content-center align-items-center">
  @for (alert of alerts(); track alert.title) {
    <div class="{{cssClass(alert)}} col-md-11 d-flex align-items-center justify-content-between"
         role="alert">

      <i class="{{cssIcon(alert)}}" aria-hidden="true" style="font-size: 50px"></i>

      <div class="message-content d-flex flex-column ps-2 pe-2">
        <span class="fw-400" [innerHTML]="alert.message"></span>
      </div>

      <div class="btn-close-container">
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"
                (click)="removeAlert(alert)">
        </button>
      </div>
    </div>
  }
</div>
